<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- background rounded rect -->
  <rect x="4" y="4" width="56" height="56" rx="14" ry="14"
        fill="#1c71d8"/>
  <!-- document body -->
  <rect x="14" y="10" width="28" height="36" rx="3" ry="3"
        fill="white" opacity="0.95"/>
  <!-- fold corner -->
  <polygon points="42,10 42,20 52,20" fill="#1c71d8" opacity="0.5"/>
  <rect x="14" y="10" width="28" height="36" rx="3" ry="3"
        fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <!-- text lines -->
  <rect x="19" y="18" width="16" height="2.5" rx="1.2" fill="#1c71d8" opacity="0.7"/>
  <rect x="19" y="23" width="20" height="2"   rx="1"   fill="#1c71d8" opacity="0.45"/>
  <rect x="19" y="27" width="18" height="2"   rx="1"   fill="#1c71d8" opacity="0.45"/>
  <rect x="19" y="31" width="20" height="2"   rx="1"   fill="#1c71d8" opacity="0.45"/>
  <!-- git branch badge -->
  <circle cx="46" cy="46" r="11" fill="#33d17a"/>
  <!-- branch icon (simplified) -->
  <circle cx="42" cy="51" r="2"  fill="white"/>
  <circle cx="50" cy="42" r="2"  fill="white"/>
  <circle cx="42" cy="42" r="2"  fill="white"/>
  <line x1="42" y1="44" x2="42" y2="49" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="42" y1="42" x2="50" y2="42" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
</svg>
